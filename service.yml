apiVersion: v1
kind: Service
metadata:
  name: stagingtest-service
spec:
  type: NodePort                # exposes the app on a port on all nodes
  selector:
    app: staging-test            # matches the Deployment pods
  ports:
    - protocol: TCP
      port: 8080              # port inside the cluster
      targetPort: 8080        # container port in pods
      nodePort: 30081         # external port on localhost